<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello U - เว็บไซต์เก็บสะสมผลงาน</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* สไตล์สำหรับจัดการโลโก้ */
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-image {
            max-width: 250px;
            height: auto;
        }
        /* สไตล์เพิ่มเติมสำหรับปุ่ม Google */
        .btn-google {
            background: #fff;
            color: #444;
            border: 1px solid #ddd;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body class="login-page">

    <div class="container theme-blue">
        <div class="logo-container">
            <img src="https://cdn.phototourl.com/free/2026-07-02-bf2530e4-cb2e-459f-93de-d59034eb5c2c.png" class="logo-image" alt="Hello U Logo">
        </div>

        <h1>เข้าสู่ระบบ</h1>
        <p>ยินดีต้อนรับกลับมา! กรุณากรอกข้อมูลเพื่อเข้าใช้งาน</p>
        
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="พิมพ์อีเมลของคุณ..." required>
            <input type="password" id="loginPassword" placeholder="พิมพ์รหัสผ่าน..." required>
            <button type="submit" class="btn">🚀 กดเพื่อเข้าสู่ระบบ</button>
            
            <button type="button" id="googleLoginBtn" class="btn btn-google">
                <i class="fab fa-google" style="color: #ea4335;"></i> เข้าสู่ระบบด้วย Google
            </button>
        </form>

        <p class="link-text">ยังไม่มีบัญชี? <a href="register.html">ลงทะเบียนที่นี่</a></p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
