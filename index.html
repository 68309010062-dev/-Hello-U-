<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello U - หน้าหลัก</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* สไตล์เพิ่มเติมสำหรับหน้า Dashboard */
        .dashboard-container {
            text-align: center;
            padding: 2.5rem 2rem;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo-image {
            max-width: 140px;
            height: auto;
        }
        .welcome-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: left;
            border: 1px solid #e2e8f0;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #f1f5f9;
        }
        .profile-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .status-badge {
            display: inline-block;
            background: #ef4444;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }
        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            transition: background 0.2s;
        }
        .btn-logout:hover {
            background: #dc2626;
        }
    </style>
</head>
