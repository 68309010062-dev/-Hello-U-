<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello U - เว็บไซต์เก็บสะสมผลงาน</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* สไตล์สำหรับจัดการโลโก้ */
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-image {
            max-width: 250px;
            height: auto;
        }

        /* 🎨 ปรับปรุงสไตล์ปุ่ม Google ให้เป็นสีมาตรฐานและรูปทรงปกติ */
        .btn-google {
            background-color: #ffffff;
            color: #1f1f1f;
            border: 1px solid #dadce0; /* สีขอบเทาอ่อนมาตรฐาน Google */
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            height: 44px;
            border-radius: 8px; /* 👈 ปรับขอบมนปกติให้เข้ากับสไตล์ปุ่มทั่วไป (ไม่ใช่ทรงแคปซูลแล้ว) */
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .btn-google:hover {
            background-color: #f8fafc;
            border-color: #c6c9ce;
        }

        /* จัดขนาดรูปไอคอน Google ด้านในปุ่ม */
        .google-icon {
            width: 18px;
            height: 18px;
            display: block;
        }
    </style>
</head>
<body class="login-page">

    <div class="container theme-blue">
        <div class="logo-container">
            <img src="https://cdn.phototourl.com/free/2026-07-02-bf2530e4-cb2e-459f-93de-d59034eb5c2c.png" class="logo-image" alt="Hello U Logo">
        </div>

        <h1>เข้าสู่ระบบ</h1>
        <p>ยินดีต้อนรับกลับมา! กรุณากรอกข้อมูลเพื่อเข้าใช้งาน</p>
        
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="พิมพ์อีเมลของคุณ..." required>
            <input type="password" id="loginPassword" placeholder="พิมพ์รหัสผ่าน..." required>
            <button type="submit" class="btn">🚀 กดเพื่อเข้าสู่ระบบ</button>
            
            <button type="button" id="googleLoginBtn" class="btn btn-google">
    <img class="google-icon" src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_1x_web_24dp.png" alt="Google Icon">
    เข้าสู่ระบบด้วย Google
</button>
        </form>

        <p class="link-text">ยังไม่มีบัญชี? <a href="register.html">ลงทะเบียนที่นี่</a></p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
